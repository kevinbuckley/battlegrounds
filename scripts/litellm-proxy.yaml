model_list:
  # Map every Claude model name Claude Code might request → local qwen3:32b
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-opus-4-6
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-opus-4-5
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-3-7-sonnet-20250219
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: claude-3-opus-20240229
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

litellm_settings:
  drop_params: true        # silently drop Anthropic-only params Ollama doesn't understand
  request_timeout: 600     # 10 min — 32B is slow on long outputs

general_settings:
  disable_spend_logs: true          # no DB needed
  disable_reset_budget: true        # no DB needed
  store_model_in_db: false          # no DB needed
  disable_error_logs: false
  # No master_key → proxy accepts any Bearer token (Claude Code sends ANTHROPIC_API_KEY)
